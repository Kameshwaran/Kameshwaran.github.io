name: Diffie QA
on:
  issue_comment:
    types: [created]

jobs:
  diffie-qa:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/diffie test')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Mint Diffie OIDC token
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('diffie.ai')
            core.setSecret(token)
            core.setOutput('token', token)

      - name: Exchange OIDC for Diffie bot token
        id: diffie-bot
        run: |
          RESPONSE=$(curl -sS -X POST https://api.diffie.ai/gh/token \
            -H "Authorization: Bearer ${{ steps.oidc.outputs.token }}")
          TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty')
          if [ -z "$TOKEN" ]; then
            echo "Failed to mint Diffie bot token: $RESPONSE"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Get PR branch
        id: pr
        run: |
          PR_DATA=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }})
          echo "ref=$(echo $PR_DATA | jq -r .head.ref)" >> $GITHUB_OUTPUT
          echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ steps.diffie-bot.outputs.token }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref }}
          fetch-depth: 0

      - name: Extract URL from comment
        id: comment
        run: |
          COMMENT="${{ github.event.comment.body }}"
          URL=$(echo "$COMMENT" | grep -oP '/diffie test \K(https?://\S+)' || echo "")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Wait for Netlify deploy preview
        id: netlify
        if: steps.comment.outputs.url == ''
        run: |
          URL="https://deploy-preview-${{ steps.pr.outputs.number }}--darling-alpaca-e3aadc.netlify.app"
          echo "Waiting for $URL to return 200..."
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Deploy preview is ready"
              echo "url=$URL" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "[$i/60] Got HTTP $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Timed out waiting for Netlify deploy preview after 5 minutes"
          exit 1

      - name: Set preview URL
        id: preview
        run: |
          if [ -n "${{ steps.comment.outputs.url }}" ]; then
            echo "url=${{ steps.comment.outputs.url }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ steps.netlify.outputs.url }}" ]; then
            echo "url=${{ steps.netlify.outputs.url }}" >> $GITHUB_OUTPUT
          else
            echo "url=" >> $GITHUB_OUTPUT
          fi

      - name: Setup Diffie credentials
        run: |
          mkdir -p ~/.diffie
          echo '{"apiToken":"${{ secrets.DIFFIE_API_TOKEN }}","apiUrl":"https://api.diffie.ai"}' > ~/.diffie/credentials.json

      - name: Export Diffie bot token for gh CLI
        run: |
          echo "${{ steps.diffie-bot.outputs.token }}" > $HOME/.diffie-gh-token
          chmod 600 $HOME/.diffie-gh-token

      # Use ANTHROPIC_API_KEY (Anthropic Console billing) OR
      # CLAUDE_CODE_OAUTH_TOKEN (Claude Max/Pro subscription — run `claude setup-token` locally).
      # Set exactly one of these as a repo secret.

      - name: Run Diffie QA (Anthropic API key)
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.diffie-bot.outputs.token }}
          claude_args: --permission-mode bypassPermissions
          show_full_output: true
          plugin_marketplaces: |
            https://github.com/codebrahma/diffie-qa-skill.git
          plugins: |
            diffie@diffie
          prompt: |
            You are in PR testing mode (CI=true). Use the diffie-qa skill.

            PR number: ${{ steps.pr.outputs.number }}
            Preview URL: ${{ steps.preview.outputs.url }}
            Repo: ${{ github.repository }}

            Follow the "PR Testing Mode (Autonomous)" workflow in the skill.
            Analyze the PR diff, create a test for the core user-facing change,
            run it against the preview URL, and post the result as a PR comment.

      - name: Run Diffie QA (Claude Max/Pro OAuth)
        if: ${{ secrets.ANTHROPIC_API_KEY == '' && secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.diffie-bot.outputs.token }}
          claude_args: --permission-mode bypassPermissions
          show_full_output: true
          plugin_marketplaces: |
            https://github.com/codebrahma/diffie-qa-skill.git
          plugins: |
            diffie@diffie
          prompt: |
            You are in PR testing mode (CI=true). Use the diffie-qa skill.

            PR number: ${{ steps.pr.outputs.number }}
            Preview URL: ${{ steps.preview.outputs.url }}
            Repo: ${{ github.repository }}

            Follow the "PR Testing Mode (Autonomous)" workflow in the skill.
            Analyze the PR diff, create a test for the core user-facing change,
            run it against the preview URL, and post the result as a PR comment.
